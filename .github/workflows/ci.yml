name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Check legal disclaimer
        run: bun run check:legal

      - name: Build
        run: bun run build

      - name: Check bundle size
        run: bun run check:bundle

      - name: Lighthouse CI
        run: bunx lhci autorun
        continue-on-error: true
